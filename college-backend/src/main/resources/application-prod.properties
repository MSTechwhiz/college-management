spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DB:college_management}

server.port=${PORT:8080}

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

payment.gateway.key=${PAYMENT_GATEWAY_KEY:mock}
payment.gateway.secret=${PAYMENT_GATEWAY_SECRET:mock}

app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

server.error.include-stacktrace=never
server.error.include-message=always

logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.com.college=INFO
